<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar de Prospecção — LocalRise Advisory</title>
<style>
  :root {
    --bg: #080810;
    --surface: #0f0f18;
    --surface2: #14141f;
    --border: #1e1e30;
    --border2: #2a2a3a;
    --accent: #E31B23;
    --accent2: #6c63ff;
    --green: #22C55E;
    --yellow: #F59E0B;
    --blue: #3B82F6;
    --text: #e8e8f0;
    --muted: #6a6a8a;
    --muted2: #4a4a6a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.5; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f0f18 0%, #12121e 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; color: white;
  }
  .logo-text { font-size: 16px; font-weight: 700; }
  .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-badge {
    font-size: 11px; font-weight: 600; padding: 5px 12px; border-radius: 20px;
    background: rgba(227,27,35,0.1); color: var(--accent); border: 1px solid rgba(227,27,35,0.2);
  }

  /* MAIN */
  .main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

  /* KPI CARDS */
  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 32px; }
  .kpi-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px 20px;
  }
  .kpi-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .kpi-value { font-size: 32px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; margin-bottom: 4px; }
  .kpi-sub { font-size: 11px; color: var(--muted); }
  .kpi-hot .kpi-value { color: var(--accent); }
  .kpi-medium .kpi-value { color: var(--yellow); }
  .kpi-cold .kpi-value { color: var(--blue); }
  .kpi-total .kpi-value { color: var(--text); }
  .kpi-mrr .kpi-value { color: var(--green); }

  /* FILTERS */
  .filters {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 20px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .filter-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 4px; }
  .filter-group { display: flex; gap: 6px; }
  .filter-btn {
    font-size: 12px; padding: 6px 14px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border2); background: transparent; color: var(--muted);
    transition: all 0.15s; white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--muted); }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .filter-btn.active-yellow { background: var(--yellow); color: #000; border-color: var(--yellow); }
  .filter-btn.active-blue { background: var(--blue); color: white; border-color: var(--blue); }
  .filter-btn.active-green { background: var(--green); color: white; border-color: var(--green); }
  .filter-sep { width: 1px; height: 28px; background: var(--border); }
  .search-input {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text); font-size: 12px; outline: none;
    width: 200px;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted2); }

  /* TABLE */
  .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .table-title { font-size: 13px; font-weight: 700; }
  .table-count { font-size: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
  thead th { text-align: left; padding: 10px 16px; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }

  .lead-name { font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .lead-city { font-size: 11px; color: var(--muted); }

  .score-bar { width: 80px; }
  .score-num { font-size: 18px; font-weight: 900; letter-spacing: -0.02em; }
  .score-track { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; }
  .score-fill { height: 4px; border-radius: 2px; }

  .badge {
    font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    white-space: nowrap; display: inline-block;
  }
  .badge-hot { background: rgba(227,27,35,0.12); color: var(--accent); border: 1px solid rgba(227,27,35,0.2); }
  .badge-medium { background: rgba(245,158,11,0.12); color: var(--yellow); border: 1px solid rgba(245,158,11,0.2); }
  .badge-cold { background: rgba(59,130,246,0.12); color: var(--blue); border: 1px solid rgba(59,130,246,0.2); }

  .tag {
    font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px;
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border2);
    white-space: nowrap; display: inline-block; margin: 1px;
  }
  .tag-site { color: var(--accent); border-color: rgba(227,27,35,0.25); background: rgba(227,27,35,0.06); }
  .tag-gbp { color: #F59E0B; border-color: rgba(245,158,11,0.25); background: rgba(245,158,11,0.06); }
  .tag-insta { color: #C084FC; border-color: rgba(192,132,252,0.25); background: rgba(192,132,252,0.06); }
  .tag-seo { color: #34D399; border-color: rgba(52,211,153,0.25); background: rgba(52,211,153,0.06); }
  .tag-gestao { color: #60A5FA; border-color: rgba(96,165,250,0.25); background: rgba(96,165,250,0.06); }

  .icon-check { color: var(--green); font-size: 13px; }
  .icon-x { color: #EF4444; font-size: 13px; }

  .score-col { color: var(--text); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 20px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto;
    transform: translateY(20px); transition: transform 0.2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header { padding: 24px 28px 0; display: flex; align-items: flex-start; justify-content: space-between; }
  .modal-body { padding: 20px 28px 28px; }
  .modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; }
  .modal-close:hover { color: var(--text); }
  .modal-section { margin-top: 20px; }
  .modal-section-title { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .modal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .modal-kpi { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .modal-kpi-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .modal-kpi-value { font-size: 18px; font-weight: 800; }
  .whatsapp-box {
    background: #0a1a0e; border: 1px solid #1a3a1e; border-radius: 12px;
    padding: 14px 16px; font-size: 13px; line-height: 1.6; color: #a0d4a8;
    white-space: pre-wrap; position: relative;
  }
  .copy-btn {
    position: absolute; top: 10px; right: 10px;
    font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 8px;
    background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3);
    cursor: pointer;
  }
  .copy-btn:hover { background: rgba(34,197,94,0.25); }
  .services-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .service-item {
    font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px;
    background: rgba(108,99,255,0.1); color: var(--accent2); border: 1px solid rgba(108,99,255,0.2);
  }
  .pacote-box {
    background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.15);
    border-radius: 12px; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .pacote-label { font-size: 11px; color: var(--muted); }
  .pacote-value { font-size: 16px; font-weight: 800; color: var(--green); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  /* PROGRESS BARS */
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .progress-label { font-size: 11px; color: var(--muted); width: 80px; flex-shrink: 0; }
  .progress-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; }
  .progress-fill { height: 5px; border-radius: 3px; }
  .progress-val { font-size: 11px; font-weight: 700; width: 30px; text-align: right; }

  @media (max-width: 900px) {
    .main { padding: 20px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .header { padding: 16px 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">LR</div>
    <div>
      <div class="logo-text">LocalRise Advisory</div>
      <div class="logo-sub">Radar de Prospecção</div>
    </div>
  </div>
  <div class="header-badge">Tchê Ofertas — Gastronomia RS</div>
</div>

<div class="main">

  <!-- KPIs -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- Filters -->
  <div class="filters">
    <span class="filter-label">Classificação</span>
    <div class="filter-group">
      <button class="filter-btn active" onclick="setFilter('classificacao','all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('classificacao','quente',this)">🔥 Quentes</button>
      <button class="filter-btn" onclick="setFilter('classificacao','medio',this)">⚡ Médios</button>
      <button class="filter-btn" onclick="setFilter('classificacao','frio',this)">❄️ Frios</button>
    </div>
    <div class="filter-sep"></div>
    <span class="filter-label">Cidade</span>
    <div class="filter-group" id="cityFilters"></div>
    <div class="filter-sep"></div>
    <span class="filter-label">Necessidade</span>
    <div class="filter-group">
      <button class="filter-btn" onclick="setFilter('tag','precisa-de-site',this)">Sem Site</button>
      <button class="filter-btn" onclick="setFilter('tag','precisa-de-gbp',this)">Sem GBP</button>
      <button class="filter-btn" onclick="setFilter('tag','precisa-de-instagram',this)">Sem Insta</button>
      <button class="filter-btn" onclick="setFilter('tag','gestao-completa',this)">Gestão Completa</button>
    </div>
    <div class="filter-sep"></div>
    <input type="text" class="search-input" placeholder="🔍 Buscar restaurante..." oninput="setSearch(this.value)">
  </div>

  <!-- Table -->
  <div class="table-container">
    <div class="table-header">
      <div class="table-title">Leads identificados</div>
      <div class="table-count" id="tableCount"></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Restaurante</th>
          <th>Score</th>
          <th>Classificação</th>
          <th>Site</th>
          <th>GBP</th>
          <th>Instagram</th>
          <th>Necessidades</th>
          <th>Pacote</th>
        </tr>
      </thead>
      <tbody id="leadsTable"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">Nenhum lead encontrado com esses filtros</div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
// ── DADOS ──────────────────────────────────────────────────────
const DATA_URL = '../data/leads-enriched.json';
let allLeads = [];
let filters = { classificacao: 'all', tag: null, search: '' };

async function loadData() {
  try {
    const res = await fetch(DATA_URL);
    const json = await res.json();
    allLeads = json.leads;
  } catch {
    // fallback inline para abrir sem servidor
    allLeads = INLINE_LEADS;
  }
  init();
}

function init() {
  buildCityFilters();
  renderKPIs();
  renderTable();
}

// ── FILTROS ──────────────────────────────────────────────────────
let activeButtons = {};

function setFilter(type, val, btn) {
  if (activeButtons[type]) {
    activeButtons[type].classList.remove('active','active-yellow','active-blue','active-green');
  }
  if (filters[type] === val && val !== 'all') {
    filters[type] = type === 'classificacao' ? 'all' : null;
    activeButtons[type] = null;
  } else {
    filters[type] = val;
    btn.classList.add('active');
    activeButtons[type] = btn;
  }
  renderTable();
}

function setSearch(val) {
  filters.search = val.toLowerCase();
  renderTable();
}

function filteredLeads() {
  return allLeads.filter(l => {
    if (filters.search && !l.nome.toLowerCase().includes(filters.search) && !l.cidade.toLowerCase().includes(filters.search)) return false;
    if (filters.classificacao !== 'all') {
      if (filters.classificacao === 'quente' && !l.classificacao.includes('Quente')) return false;
      if (filters.classificacao === 'medio' && !l.classificacao.includes('Médio')) return false;
      if (filters.classificacao === 'frio' && !l.classificacao.includes('Frio')) return false;
    }
    if (filters.tag && !l.tags.includes(filters.tag)) return false;
    if (filters.cidade && l.cidade !== filters.cidade) return false;
    return true;
  }).sort((a, b) => b.score - a.score);
}

function buildCityFilters() {
  const cities = [...new Set(allLeads.map(l => l.cidade))].sort();
  const container = document.getElementById('cityFilters');
  cities.forEach(city => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = city;
    btn.onclick = function() {
      if (filters.cidade === city) {
        filters.cidade = null;
        this.classList.remove('active');
      } else {
        document.querySelectorAll('#cityFilters .filter-btn').forEach(b => b.classList.remove('active'));
        filters.cidade = city;
        this.classList.add('active');
      }
      renderTable();
    };
    container.appendChild(btn);
  });
}

// ── KPIs ──────────────────────────────────────────────────────
function renderKPIs() {
  const leads = allLeads;
  const quentes = leads.filter(l => l.classificacao.includes('Quente')).length;
  const medios = leads.filter(l => l.classificacao.includes('Médio')).length;
  const frios = leads.filter(l => l.classificacao.includes('Frio')).length;
  const semSite = leads.filter(l => !l.site.existe).length;
  const semGbp = leads.filter(l => !l.gbp.existe).length;
  const pctSemSite = Math.round((semSite / leads.length) * 100);
  const pctSemGbp = Math.round((semGbp / leads.length) * 100);

  // MRR potencial (estimado)
  const mrrQuente = quentes * 2800;
  const mrrTotal = leads.filter(l => !l.classificacao.includes('Frio')).length * 2500;

  const cards = [
    { label: 'Total de Leads', value: leads.length, sub: `${leads.length} restaurantes analisados`, cls: 'kpi-total' },
    { label: '🔥 Leads Quentes', value: quentes, sub: `${Math.round(quentes/leads.length*100)}% do total — prioridade máxima`, cls: 'kpi-hot' },
    { label: '⚡ Leads Médios', value: medios, sub: `abordagem consultiva`, cls: 'kpi-medium' },
    { label: '% sem site', value: `${pctSemSite}%`, sub: `${semSite} de ${leads.length} sem site próprio`, cls: 'kpi-hot' },
    { label: 'MRR potencial', value: `R$${(mrrTotal/1000).toFixed(0)}k`, sub: `se fechar leads quentes + médios`, cls: 'kpi-mrr' },
  ];

  document.getElementById('kpiGrid').innerHTML = cards.map(c => `
    <div class="kpi-card ${c.cls}">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>
  `).join('');
}

// ── TABLE ──────────────────────────────────────────────────────
function renderTable() {
  const leads = filteredLeads();
  const tbody = document.getElementById('leadsTable');
  const empty = document.getElementById('emptyState');
  document.getElementById('tableCount').textContent = `${leads.length} lead${leads.length !== 1 ? 's' : ''}`;

  if (leads.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = leads.map(l => {
    const scoreColor = l.score >= 80 ? '#E31B23' : l.score >= 50 ? '#F59E0B' : '#3B82F6';
    const badgeCls = l.score >= 80 ? 'badge-hot' : l.score >= 50 ? 'badge-medium' : 'badge-cold';
    const tags = l.tags.map(t => {
      const map = {
        'precisa-de-site': ['tag-site','Sem Site'],
        'precisa-de-gbp': ['tag-gbp','Sem GBP'],
        'precisa-de-instagram': ['tag-insta','Sem Insta'],
        'precisa-de-seo': ['tag-seo','Sem SEO'],
        'gestao-completa': ['tag-gestao','Gestão Completa'],
      };
      const [cls, label] = map[t] || ['',''];
      return `<span class="tag ${cls}">${label}</span>`;
    }).join('');

    const pacoteShort = l.pacote_sugerido.split(' —')[0];

    return `
      <tr onclick="openModal('${l.id}')">
        <td>
          <div class="lead-name">${l.nome}</div>
          <div class="lead-city">${l.cidade} · ${l.categoria}</div>
        </td>
        <td>
          <div class="score-num" style="color:${scoreColor}">${l.score}</div>
          <div class="score-track">
            <div class="score-fill" style="width:${l.score}%;background:${scoreColor}"></div>
          </div>
        </td>
        <td><span class="badge ${badgeCls}">${l.classificacao}</span></td>
        <td>${l.site.existe ? '<span class="icon-check">✓</span>' : '<span class="icon-x">✗</span>'}</td>
        <td>
          ${l.gbp.existe
            ? `<span class="icon-check">✓</span> <span style="font-size:11px;color:var(--muted)">${l.gbp.nota ?? '—'} ⭐ (${l.gbp.total_avaliacoes})</span>`
            : '<span class="icon-x">✗ Inexistente</span>'}
        </td>
        <td>
          ${l.instagram.existe
            ? `<span class="icon-check">✓</span> <span style="font-size:11px;color:var(--muted)">${l.instagram.handle ?? ''}</span>`
            : '<span class="icon-x">✗</span>'}
        </td>
        <td style="max-width:200px">${tags || '<span style="color:var(--muted);font-size:11px">Boa presença</span>'}</td>
        <td style="font-size:11px;font-weight:700;color:var(--muted)">${pacoteShort}</td>
      </tr>
    `;
  }).join('');
}

// ── MODAL ──────────────────────────────────────────────────────
function openModal(id) {
  const l = allLeads.find(x => x.id === id);
  if (!l) return;

  const scoreColor = l.score >= 80 ? '#E31B23' : l.score >= 50 ? '#F59E0B' : '#3B82F6';
  const badgeCls = l.score >= 80 ? 'badge-hot' : l.score >= 50 ? 'badge-medium' : 'badge-cold';

  const progressBar = (label, val, color) => `
    <div class="progress-row">
      <div class="progress-label">${label}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${val}%;background:${color}"></div></div>
      <div class="progress-val" style="color:${color}">${val}</div>
    </div>
  `;

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span style="font-size:20px;font-weight:900">${l.nome}</span>
          <span class="badge ${badgeCls}">${l.classificacao}</span>
        </div>
        <div style="font-size:12px;color:var(--muted)">${l.cidade} · ${l.categoria}</div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">

      <!-- Score principal -->
      <div style="display:flex;align-items:center;gap:20px;margin:16px 0;padding:16px;background:var(--surface2);border-radius:12px;border:1px solid var(--border)">
        <div style="text-align:center;flex-shrink:0">
          <div style="font-size:48px;font-weight:900;color:${scoreColor};line-height:1">${l.score}</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Score</div>
        </div>
        <div style="flex:1">
          ${progressBar('GBP', l.gbp.score_gbp, '#F59E0B')}
          ${progressBar('Site', l.site.score_site, '#3B82F6')}
          ${progressBar('Instagram', l.instagram.score_instagram, '#C084FC')}
        </div>
      </div>

      <!-- Dados por canal -->
      <div class="modal-section">
        <div class="modal-section-title">Diagnóstico Digital</div>

          <div class="modal-kpi">
            <div class="modal-kpi-label">GBP — Nota Google</div>

          </div>
          <div class="modal-kpi">
            <div class="modal-kpi-label">Avaliações Google</div>
            <div class="modal-kpi-value" style="color:${l.gbp.total_avaliacoes > 200 ? 'var(--green)' : 'var(--accent)'}">${l.gbp.total_avaliacoes}</div>
          </div>
          <div class="modal-kpi">
            <div class="modal-kpi-label">Site</div>
            <div class="modal-kpi-value">${l.site.existe ? '✅ Sim' : '❌ Não'}</div>
          </div>
          <div class="modal-kpi">
            <div class="modal-kpi-label">Instagram</div>
            <div class="modal-kpi-value">${l.instagram.existe ? '✅ ' + (l.instagram.handle ?? '') : '❌ Não'}</div>
          </div>
          <div class="modal-kpi">
            <div class="modal-kpi-label">Seguidores IG</div>
            <div class="modal-kpi-value" style="color:#C084FC">${l.instagram.seguidores_estimados?.toLocaleString('pt-BR') ?? '—'}</div>
          </div>
          <div class="modal-kpi">
            <div class="modal-kpi-label">Engajamento IG</div>
            <div class="modal-kpi-value" style="color:#C084FC">${l.instagram.engajamento_pct ? l.instagram.engajamento_pct + '%' : '—'}</div>
          </div>
        </div>
      </div>

      <!-- Argumento -->
      <div class="modal-section">
        <div class="modal-section-title">Argumento Comercial</div>
        <div style="font-size:13px;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;line-height:1.6">
          ${l.argumento_principal}
        </div>
      </div>

      <!-- Serviços -->
      <div class="modal-section">
        <div class="modal-section-title">Serviços Recomendados</div>
        <div class="services-list">
          ${l.servicos_recomendados.map(s => `<span class="service-item">${s}</span>`).join('')}
        </div>
      </div>

      <!-- Pacote -->
      <div class="modal-section">
        <div class="pacote-box">
          <div>
            <div class="pacote-label">Pacote Sugerido</div>

          </div>

      <div class="modal-section">
        <div class="modal-section-title">Mensagem WhatsApp</div>
        <div class="whatsapp-box" id="wppMsg-${l.id}">
${l.whatsapp_msg}
          <button class="copy-btn" onclick="copyMsg('${l.id}')">Copiar</button>
        </div>
      </div>

      <!-- Link oferta -->
      <div style="margin-top:16px;text-align:center">
        <a href="${l.link_oferta}" target="_blank"
          style="font-size:12px;color:var(--muted);text-decoration:none;border:1px solid var(--border2);padding:8px 16px;border-radius:20px;display:inline-block;transition:color 0.15s"
          onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">
          Ver oferta no Tchê Ofertas →
        </a>
      </div>
    </div>
  `;

  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

function copyMsg(id) {
  const el = document.getElementById(`wppMsg-${id}`);
  const text = el.innerText.replace('Copiar','').trim();
  navigator.clipboard.writeText(text).then(() => {
    const btn = el.querySelector('.copy-btn');
    btn.textContent = 'Copiado!';
    setTimeout(() => btn.textContent = 'Copiar', 2000);
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
